apiVersion: kafka.services.k8s.aws/v1alpha1
kind: ServerlessCluster
metadata:
  name: $PROVISIONED_CLUSTER_NAME
spec:
  name: $PROVISIONED_CLUSTER_NAME
  provisioned:
    brokerNodeGroupInfo:
      instanceType: "kafka.t3.small"
      clientSubnets:
        - $SUBNET_ID_1
        - $SUBNET_ID_2
      storageInfo:
        ebsStorageInfo:
          volumeSize: 10
    kafkaVersion: "3.7.x"
    numberOfBrokerNodes: 2
